<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Assistonnes - 88 Key Piano</title>
<link rel="manifest" href="/assis2/manifest.json">
 <style>

  html {
    font-size: clamp(5px, 1vmax, 18px);
  }

  .fs-btn {
    position: fixed;
    top: 8px;
    right: 8px;
    z-index: 9999;

    font-size: 2rem;   /* change from 14px */
    padding: 0.4em 0.7em;

    border-radius: 0.4em;
    border: 1px solid #444;
    background: #111;
    color: #fff;
    opacity: 0.85;
  }

  .fs-btn:active {
    opacity: 1;
  }
  svg { display:block; }
#top {
  position: relative;
  margin:0% auto;
  display: flex;
  flex-direction: row;         /* horizontal layout */
  align-items: center;     /* top-aligned */
  justify-content: center;     /* optional: center the whole row */
  width: 100%;
  padding: 0.5rem;
  box-sizing: border-box;
  aspect-ratio: 3/1;
  overflow: hidden;
}

  @media (orientation: portrait) {
    #top {
      width: 100%;
      height: auto;
    }
  }
  @media (orientation: landscape) {
    #top {
      width: auto;
      height: 40%;
    }
  }

#left-column, #center-column, #right-column {
  display: flex;
  flex-direction: column;
  gap: 0rem;
  height: 100%;
  align-items: center;
  justify-content: center;
  margin: auto 0%;
}

#center-column {
  width: 40%;
  height: 100%;
}
#left-column, #right-column {
  width: 30%;
  height: 100%;
}
</style>
</head>
<body>

  <!-- Fullscreen controls -->
  <button id="fullscreenBtn" class="fs-btn" hidden>
    ⛶
  </button>

  <button id="exitFullscreenBtn" class="fs-btn" hidden>
    ✕
  </button>
  <div id="top">
    <div id="left-column"></div>
    <div id="center-column"></div>
    <div id="right-column"></div>
  </div>
  <!-- Your existing scripts -->
  
 <!-- <script src="key.js"></script> -->
  <script src="piano.js"></script>
  <script src="keyboard.js"></script>
  <script src="ruler.js"></script>
   <script src="circle.js"></script>
  <script src="scale.js"></script>
  <script src="staff.js"></script>
<!-- <script src="buttons.js"></script> -->
 <script src="screen.js"></script>

 <script src="sruler.js"></script>
  

  <!-- Fullscreen + orientation logic -->
  <script>
    const fsBtn = document.getElementById('fullscreenBtn');
    const exitBtn = document.getElementById('exitFullscreenBtn');

    function isMobilePortrait() {
      return window.innerWidth < window.innerHeight;
    }

    async function enterFullscreen() {
      if (document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
      }

      if (screen.orientation?.lock) {
        try {
          await screen.orientation.lock('landscape');
        } catch {
          // silently ignore (iOS etc.)
        }
      }
    }

    async function exitFullscreen() {
      if (document.exitFullscreen) {
        await document.exitFullscreen();
      }
    }

    function updateButtons() {
      const isFS = !!document.fullscreenElement;

      // Show fullscreen button only on mobile portrait & not fullscreen
      fsBtn.hidden = isFS || !isMobilePortrait();

      // Show exit button only while fullscreen
      exitBtn.hidden = !isFS;
    }

    fsBtn.addEventListener('click', enterFullscreen);
    exitBtn.addEventListener('click', exitFullscreen);

    document.addEventListener('fullscreenchange', updateButtons);
    window.addEventListener('resize', updateButtons);

    updateButtons();
  </script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/assis2/service-worker.js')
      .then(reg => console.log('SW registered', reg.scope))
      .catch(err => console.error('SW failed', err));
  });
}
</script>
</body>
</html>
